server {
    listen 80;

    # --- Security Headers (applied to all responses) ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    server_tokens off;

    # --- BLOCK: Admin routes must never be reachable from outside ---
    # /admin/* is internal-only. Even if a client guesses the URL,
    # they receive a hard 403 at the edge — the backend is never contacted.
    location /api/admin/ {
        return 403;
    }
    location /admin/ {
        return 403;
    }

    # --- BLOCK: API docs must not be publicly visible in production ---
    location /api/docs {
        return 403;
    }
    location /api/openapi.json {
        return 403;
    }

    # Serve the HTML frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the ADK Agent to bypass CORS issues
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://production-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type "application/json";
        # Strip internal headers that must never be forwarded to clients
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Proxy Webhook requests directly to the backend
    location /webhooks/ {
        proxy_pass http://production-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
}
