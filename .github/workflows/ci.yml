name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  secret-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full git history is required for scan accuracy

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # Prevents blocking build due to mock/stub test files, but provides inline warnings

  backend-checks:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/pyproject.toml"

      - name: Install Dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Run Ruff Lint Check
        run: uv run ruff check .
        working-directory: backend

      - name: Run Ruff Format Check
        run: uv run ruff format --check .
        working-directory: backend

      - name: Run Backend Tests
        run: uv run pytest
        working-directory: backend

  frontend-checks:
    name: Frontend Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

      - name: Run Frontend Tests
        run: npm run test
        working-directory: frontend

      - name: Build Application
        run: npm run build
        working-directory: frontend

  docker-build:
    name: Validate Docker Builds
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Docker Compose Config
        run: docker compose config

      - name: Build Containers
        run: docker compose build

  deploy:
    name: Automatic Cloud Deployment
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Cloud VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        # Will run if secrets are configured in the repository
        if: "${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_KEY != '' }}"
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /app/pixxi-crm
            git pull origin main
            docker compose down
            docker compose up -d --build
