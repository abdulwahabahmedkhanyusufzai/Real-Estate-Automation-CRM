name: CI Checks

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  python-checks:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "adk-agent/pyproject.toml"

      - name: Install Dependencies
        run: uv sync --frozen
        working-directory: adk-agent

      - name: Run Ruff Lint Check
        run: uv run ruff check .
        working-directory: adk-agent

      - name: Run Ruff Format Check
        run: uv run ruff format --check .
        working-directory: adk-agent

  frontend-checks:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/frontend-app/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend/frontend-app

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend/frontend-app

      - name: Build Application
        run: npm run build
        working-directory: frontend/frontend-app

  docker-checks:
    name: Docker Compose & Image Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Docker Compose Config
        run: docker compose config

      - name: Build Containers
        # Builds all local services (ollama-backend, adk-agent, frontend)
        # to ensure the Dockerfiles are fully compilable.
        run: docker compose build
