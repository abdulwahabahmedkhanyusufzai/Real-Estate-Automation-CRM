services:
  gemma-backend:
    image: ollama/ollama:latest
    container_name: production-gemma-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_NUM_CTX=512
      - OLLAMA_HOST=0.0.0.0:8080
      - OLLAMA_DEBUG=false
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ./ollama-models:/root/.ollama

  db:
    image: postgres:16-alpine
    container_name: production-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=pixxi
      - POSTGRES_PASSWORD=pixxi_secure_pass_99
      - POSTGRES_DB=pixxi_crm
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixxi -d pixxi_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: local-backend
    container_name: production-backend
    restart: unless-stopped
    ports:
      - "8000:8080"
    env_file:
      - ./backend/app/.env
    environment:
      - GOOGLE_CLOUD_PROJECT=local-dev
      - GOOGLE_CLOUD_LOCATION=local
      - GEMMA_MODEL_NAME=gemma3:270m
      # Docker Compose automatically resolves service names to internal IPs
      - OLLAMA_API_BASE=http://gemma-backend:8080
      - PORT=8000
      - DATABASE_URL=postgresql://pixxi:pixxi_secure_pass_99@db:5432/pixxi_crm
    depends_on:
      gemma-backend:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
   
  frontend:
    # Builds the React app under ./frontend and serves via Nginx
    build:
      context: ./frontend
    image: local-frontend
    container_name: production-frontend
    restart: unless-stopped
    ports:
      - "8081:80"  # Exposes the UI to the public internet on standard port 80
    depends_on:
      backend:
        condition: service_healthy
